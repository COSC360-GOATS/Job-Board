services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/yourdb
      - PORT=4000
      - JWT_SECRET=anyrandomstring
    depends_on:
      - mongo

volumes:
  mongo_data:
